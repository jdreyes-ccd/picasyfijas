services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: picasyfijas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  webapp:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/picasyfijas
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/validate/1234"]
      interval: 50s
      timeout: 20s
      retries: 5
  unittests:
    build: .
    command: pytest
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/picasyfijas
    depends_on:
      - db
      - webapp
  e2e:
    build: .
    command: pytest e2e
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/picasyfijas
    depends_on:
      - db
      - webapp

volumes:
  pgdata: